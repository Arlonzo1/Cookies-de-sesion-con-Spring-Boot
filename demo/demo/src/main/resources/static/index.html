<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Sesiones Spring Boot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .section { margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .btn-group { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    button:hover { opacity: 0.85; }
    .btn-green  { background: #22c55e; color: white; }
    .btn-blue   { background: #3b82f6; color: white; }
    .btn-red    { background: #ef4444; color: white; }
    .result { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; font-size: 13px; min-height: 48px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .result.ok    { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .result.error { border-color: #fca5a5; background: #fef2f2; color: #991b1b; }
    .divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }
    .cookie-box { font-size: 12px; color: #64748b; background: #f8fafc; border-radius: 8px; padding: 10px 14px; border: 1px dashed #cbd5e1; word-break: break-all; }
  </style>
</head>
<body>
<div class="card">
  <h1>🍪 Demo Cookies de Sesión</h1>
  <p class="sub">Spring Boot — com.example.demo</p>

  <div class="section">
    <label>Nombre de usuario</label>
    <input type="text" id="nombre" placeholder="Ej: Juan" value="Juan">
    <div class="btn-group">
      <button class="btn-green" onclick="login()">Login (POST /login)</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="btn-group">
      <button class="btn-blue" onclick="perfil()">Ver perfil (GET /perfil)</button>
      <button class="btn-red"  onclick="logout()">Logout (DELETE /logout)</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <label>Respuesta del servidor</label>
    <div class="result" id="resultado">Aquí aparecerá la respuesta...</div>
  </div>

  <hr class="divider">

  <div class="section">
    <label>Cookie activa en el navegador</label>
    <div class="cookie-box" id="cookie-box">Sin cookie aún</div>
  </div>
</div>

<script>
  const res  = document.getElementById('resultado');
  const cbox = document.getElementById('cookie-box');

  function updateCookie() {
    const c = document.cookie || 'Sin cookie (puede ser HttpOnly — solo el servidor la ve)';
    cbox.textContent = c;
  }

  async function login() {
    const nombre = document.getElementById('nombre').value.trim() || 'Juan';
    try {
      const r = await fetch(`/login?nombre=${encodeURIComponent(nombre)}`, { method: 'POST' });
      const t = await r.text();
      res.className = 'result ok';
      res.textContent = '✅ ' + t;
    } catch(e) {
      res.className = 'result error';
      res.textContent = '❌ Error: ' + e.message;
    }
    updateCookie();
  }

  async function perfil() {
    try {
      const r = await fetch('/perfil');
      const t = await r.text();
      res.className = t.includes('No hay') ? 'result error' : 'result ok';
      res.textContent = (t.includes('No hay') ? '❌ ' : '👤 ') + t;
    } catch(e) {
      res.className = 'result error';
      res.textContent = '❌ Error: ' + e.message;
    }
    updateCookie();
  }

  async function logout() {
    try {
      const r = await fetch('/logout', { method: 'DELETE' });
      const t = await r.text();
      res.className = 'result ok';
      res.textContent = '👋 ' + t;
    } catch(e) {
      res.className = 'result error';
      res.textContent = '❌ Error: ' + e.message;
    }
    updateCookie();
  }

  updateCookie();
</script>
</body>
</html>
